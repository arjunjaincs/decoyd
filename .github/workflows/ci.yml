name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / GOOS=${{ matrix.goos }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux runner building for Linux
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          # Linux runner cross-compiling for Windows
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
          # Windows runner building for Windows
          - os: windows-latest
            goos: windows
            goarch: amd64
          # Windows runner cross-compiling for Linux
          - os: windows-latest
            goos: linux
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build (cross-compile ${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Test (native only — ${{ matrix.os }})
        # Tests run native; cross-compiled binaries can't be executed here.
        # We run tests only when goos matches the runner's OS.
        if: |
          (matrix.os == 'ubuntu-latest' && matrix.goos == 'linux') ||
          (matrix.os == 'windows-latest' && matrix.goos == 'windows')
        run: go test -v -race ./...

  security:
    name: Security Scan (govulncheck + gosec)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        # -severity medium: skip informational; -confidence medium: skip noise.
        # -exclude G304: flagged for variable file paths in deploy — intentional.
        # -fmt sarif outputs results for GitHub Advanced Security if available.
        run: gosec -severity medium -confidence medium -exclude G304 ./...
