name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / GOOS=${{ matrix.goos }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux runner building for Linux
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          # Linux runner cross-compiling for Windows
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
          # Windows runner building for Windows
          - os: windows-latest
            goos: windows
            goarch: amd64
          # Windows runner cross-compiling for Linux
          - os: windows-latest
            goos: linux
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # Disable the built-in cache: it uses /usr/bin/tar which fails on
          # ubuntu-latest runners with a tar exit-2 error when restoring the
          # Go module cache. We do our own caching below.
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build (cross-compile ${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Test (native only — ${{ matrix.os }})
        # Tests run native; cross-compiled binaries can't be executed here.
        # We run tests only when goos matches the runner's OS.
        if: |
          (matrix.os == 'ubuntu-latest' && matrix.goos == 'linux') ||
          (matrix.os == 'windows-latest' && matrix.goos == 'windows')
        run: go test -v -race ./...

  security:
    name: Security Scan (govulncheck + gosec)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        # -show=color for readable output; default mode reports only
        # vulnerabilities reachable from our code (not all transitive stdlib).
        # With Go 1.24 the TLS/x509 vulns present in 1.22 are patched.
        run: govulncheck ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        # -severity medium: skip informational findings.
        # -confidence medium: skip low-confidence noise.
        # -exclude G304: variable file path in deploy/deploy.go — intentional
        #   (we write tokens to user-chosen paths, that is the feature).
        # -exclude G107: url provided to HTTP request as taint in alert/alert.go
        #   — intentional (webhook URLs come from user config, not untrusted input).
        run: gosec -severity medium -confidence medium -exclude G304 -exclude G107 ./...
