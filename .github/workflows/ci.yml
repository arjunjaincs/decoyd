name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / GOOS=${{ matrix.goos }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux runner building for Linux
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          # Linux runner cross-compiling for Windows
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
          # Windows runner building for Windows
          - os: windows-latest
            goos: windows
            goarch: amd64
          # Windows runner cross-compiling for Linux
          - os: windows-latest
            goos: linux
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # "stable" resolves to the latest released Go patch (e.g. 1.26.5).
          # This is intentional for the build/test job: we want to know the
          # code compiles and tests pass on a current toolchain.
          # go.mod declares the MINIMUM required version (1.25.0); "stable"
          # will always satisfy that.
          go-version: "stable"
          # Disable setup-go's built-in cache — it uses /usr/bin/tar on
          # ubuntu-latest which intermittently fails with exit 2. We manage
          # the Go module cache ourselves with actions/cache below.
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Build (cross-compile ${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Test (native only — ${{ matrix.os }})
        # Tests run native; cross-compiled binaries can't be executed here.
        # We run tests only when goos matches the runner's OS.
        if: |
          (matrix.os == 'ubuntu-latest' && matrix.goos == 'linux') ||
          (matrix.os == 'windows-latest' && matrix.goos == 'windows')
        run: go test -v -race ./...

  security:
    name: Security Scan (govulncheck + gosec)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Use "stable" here specifically to avoid govulncheck false-positives.
          #
          # govulncheck reports vulnerabilities in the Go TOOLCHAIN ITSELF
          # (not just module deps) when the Go version in use has unpatched
          # stdlib CVEs. Pinning to a specific old patch (e.g. 1.25.0) means
          # all CVEs fixed in later patches (1.25.3, 1.25.4, …) still show up.
          # "stable" always installs the latest released patch which has all
          # known CVEs fixed — so govulncheck only fires on genuine issues in
          # our own code or third-party dependencies, not on already-patched
          # stdlib vulnerabilities.
          go-version: "stable"
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-security-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-security-

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        # -severity medium: skip informational findings.
        # -confidence medium: skip low-confidence noise.
        # -exclude G107: HTTP URL from user config in alert/alert.go — intentional
        #   (webhook URLs come from the operator's own config, not untrusted input).
        #   G304 (file path via variable) is suppressed inline with #nosec comments
        #   at each site, documenting why each path is safe.
        run: gosec -severity medium -confidence medium -exclude G107 ./...
